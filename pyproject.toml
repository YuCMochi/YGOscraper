[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests that hit real external APIs (deselect with '-m \"not integration\"')"
]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
